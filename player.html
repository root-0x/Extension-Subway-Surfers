<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>V12 · SubwaySurfers — Player</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --text-primary: #fafafa;
            --accent: #dc2626;
            --accent-glow: rgba(220, 38, 38, 0.4);
            --border: #262626;
            --radius: 14px;
        }
        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--accent-glow); transform: scale(1); }
            50% { opacity: 0.85; box-shadow: 0 0 18px var(--accent-glow); transform: scale(1.1); }
        }
        body {
            margin: 0; padding: 0;
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 40% at 80% 20%, rgba(220, 38, 38, 0.08) 0%, transparent 50%);
            animation: bgPulse 6s ease-in-out infinite;
            pointer-events: none;
        }
        .header {
            padding: 12px 16px; background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; -webkit-app-region: drag;
            border-radius: var(--radius) var(--radius) 0 0;
            position: relative;
            z-index: 1;
        }
        .live-indicator { display: flex; align-items: center; gap: 6px; color: var(--accent); font-size: 10px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: livePulse 2s ease-in-out infinite; }
        #player-container { flex: 1; background: #000; position: relative; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls {
            padding: 15px 20px; background: var(--card-bg);
            border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 15px;
            border-radius: 0 0 var(--radius) var(--radius);
            position: relative;
            z-index: 1;
        }
        .volume-icon { opacity: 0.7; font-size: 16px; cursor: pointer; }
        input[type=range] { flex: 1; appearance: none; -webkit-appearance: none; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--accent); margin-top: -5px; box-shadow: 0 0 12px var(--accent-glow); transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .volume-value { font-size: 12px; font-weight: 700; min-width: 35px; text-align: right; color: var(--accent); }
    </style>
</head>
<body>
    <div class="header">
        <span>V12 · SubwaySurfers</span>
        <div class="live-indicator"><div class="dot"></div><span>ONLINE</span></div>
    </div>
    <div id="player-container">
        </div>
    <div class="controls">
        <div class="volume-icon" id="muteBtn">🔊</div>
        <input type="range" id="volumeSlider" min="0" max="100" value="100">
        <div class="volume-value" id="volumeText">100%</div>
    </div>
    <script src="player.js"></script>
</body>
</html>
